[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Tests import core/src modules as top-level (conftest.py adds src to sys.path,
# matching how the hub runs). Keep the source root out of the collection path.
addopts = -q
filterwarnings =
    # WebStarlette/anyio deprecations from the framework are noisy and not
    # ours to fix in a test run; surface only our own failures.
    ignore::DeprecationWarning