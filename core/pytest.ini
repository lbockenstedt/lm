[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# Run bare `async def test_*` without a per-test @pytest.mark.asyncio. pytest-asyncio
# defaults to STRICT mode (unmarked async tests are collected-but-skipped and
# reported as failures), which made `pytest -q` show ~30 false failures. `auto`
# treats every async test as a coroutine test — matching what the suite assumes.
asyncio_mode = auto
# Tests import core/src modules as top-level (conftest.py adds src to sys.path,
# matching how the hub runs). Keep the source root out of the collection path.
addopts = -q
filterwarnings =
    # WebStarlette/anyio deprecations from the framework are noisy and not
    # ours to fix in a test run; surface only our own failures.
    ignore::DeprecationWarning