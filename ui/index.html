<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Manager | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- Header -->
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Lab Manager <span class="text-blue-500">Hub</span></h1>
                <p class="text-slate-400 text-sm">Infrastructure Orchestration & Control</p>
            </div>
            <div id="connection-status" class="flex items-center gap-2 px-3 py-1 rounded-full glass text-xs font-medium">
                <div class="w-2 h-2 rounded-full bg-slate-500 status-pulse"></div>
                <span class="text-slate-300">Connecting...</span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Sidebar: Spoke Status -->
            <div class="lg:col-span-1 space-y-6">
                <section class="glass rounded-2xl p-6">
                    <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 //dummy"></path></svg>
                        Active Spokes
                    </h2>
                    <div id="spoke-list" class="space-y-3">
                        <div class="animate-pulse flex space-x-4 p-2">
                            <div class="rounded-full bg-slate-700 h-10 w-10"></div>
                            <div class="flex-1 space-y-6 py-1">
                                <div class="h-2 bg-slate-700 rounded"></div>
                                <div class="h-2 bg-slate-700 rounded w-5/6"></div>
                            </div>
                        </div>
                    </div>
                </section>

                <section class="glass rounded-2xl p-6">
                    <h2 class="text-lg font-semibold mb-4">System Info</h2>
                    <div class="text-sm space-y-2 text-slate-400">
                        <div class="flex justify-between"><span>Version</span><span id="sys-version" class="text-slate-200">Loading...</span></div>
                        <div class="flex justify-between"><span>Uptime</span><span id="sys-uptime" class="text-slate-200">Calculating...</span></div>
                    </div>
                </section>
            </div>

            <!-- Main Content: Resource Manager -->
            <div class="lg:col-span-2 space-y-6">
                <section class="glass rounded-2xl p-6">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-bold">Resource Manager</h2>
                        <div class="flex gap-2">
                            <input id="vm-id-input" type="text" placeholder="Enter VM ID (e.g. vm-101)" class="bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                            <button onclick="lookupFirewall()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors">Lookup Firewall</button>
                        </div>
                    </div>

                    <div id="vm-details" class="hidden space-y-4">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700">
                                <label class="text-xs text-slate-500 uppercase font-bold">VM ID</label>
                                <div id="res-vm-id" class="text-lg font-medium text-slate-200">-</div>
                            </div>
                            <div class="p-4 rounded-xl bg-slate-800/50 border border-slate-700">
                                <label class="text-xs text-slate-500 uppercase font-bold">IP Address</label>
                                <div id="res-ip" class="text-lg font-medium text-blue-400">-</div>
                            </div>
                        </div>

                        <div class="mt-6">
                            <h3 class="text-sm font-semibold text-slate-400 mb-3 uppercase tracking-wider">OPNsense Firewall Rules</h3>
                            <div id="firewall-results" class="overflow-hidden rounded-xl border border-slate-700 bg-slate-900/50">
                                <table class="w-full text-left text-sm">
                                    <thead class="bg-slate-800 text-slate-400 uppercase text-xs">
                                        <tr>
                                            <th class="px-4 py-2">Rule ID</th>
                                            <th class="px-4 py-2">Action</th>
                                            <th class="px-4 py-2">Protocol</th>
                                            <th class="px-4 py-2">Destination</th>
                                        </tr>
                                    </thead>
                                    <tbody id="firewall-table-body" class="divide-y divide-slate-700">
                                        <!-- Rows injected here -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div id="vm-empty-state" class="py-12 text-center text-slate-500">
                        <svg class="w-12 h-12 mx-auto mb-3 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                        <p>Enter a VM ID to inspect its connectivity and firewall rules.</p>
                    </div>
                </section>
            </div>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
