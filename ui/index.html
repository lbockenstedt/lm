<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Manager | Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        :root {
            --hpe-green: #01A982;
            --hpe-navy: #263040;
            --hpe-navy-dark: #1F2531;
            --hpe-bg-light: #F5F5F5;
            --hpe-white: #FFFFFF;
            --hpe-text-main: #444444;
            --hpe-text-muted: #767676;
            --hpe-border: #CCCCCC;
        }

        /* LCARS Theme Overrides */
        body.lcars-theme {
            --lcars-gold: #ffcc00;
            --lcars-orange: #ff9900;
            --lcars-pink: #cc6699;
            --lcars-blue: #6699ff;
            --lcars-black: #000;
            background-color: var(--lcars-black) !important;
            color: var(--lcars-gold) !important;
            font-family: 'Inter', sans-serif !important;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: grid !important;
            grid-template-columns: 220px 1fr !important;
            grid-template-rows: 100px 1fr !important;
            flex: none !important; /* Kill flex layout */
        }

        /* THE SIDEBAR AS A COMMAND COLUMN */
        body.lcars-theme .hpe-sidebar {
            grid-row: 1 / 3;
            background: var(--lcars-black) !important;
            border: none !important;
            padding: 20px 0 20px 20px !important;
            width: auto !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: flex-start !important;
        }

        /* THE TOPBAR AS AN UPPER BEAM */
        body.lcars-theme .hpe-topbar {
            grid-column: 2 / 3;
            background: var(--lcars-black) !important;
            border: none !important;
            height: 100px !important;
            position: relative;
            display: flex !important;
            align-items: center !important;
            justify-content: space-between !important;
        }

        /* THE "ELBOW" - The signature LCARS curved structural beam */
        body.lcars-theme .hpe-topbar::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: var(--lcars-orange);
            border-radius: 0 0 40px 40px;
            box-shadow: 0 6px 0 var(--lcars-gold);
            z-index: -1;
        }

        body.lcars-theme .hpe-sidebar::after {
            content: "";
            position: absolute;
            top: 0;
            right: 0;
            width: 30px;
            height: 100%;
            background: var(--lcars-gold);
            border-radius: 0 40px 40px 0;
            z-index: -1;
        }

        /* INTERLOCKING NAV BLOCKS */
        body.lcars-theme .nav-item {
            color: var(--lcars-black) !important;
            background: var(--lcars-blue) !important;
            border: none !important;
            border-radius: 20px 0 0 20px !important;
            margin-bottom: 12px !important;
            padding: 15px !important;
            text-align: right !important;
            font-weight: 900 !important;
            transition: all 0.1s ease;
        }

        body.lcars-theme .nav-item:hover {
            background: var(--lcars-gold) !important;
            transform: translateX(8px);
        }

        body.lcars-theme .nav-item.active {
            background: var(--lcars-pink) !important;
            color: white !important;
            border-radius: 0 20px 20px 0 !important;
            text-align: left !important;
        }

        /* CONTENT VIEWPORT - Pushed into the "Elbow" */
        body.lcars-theme #viewport {
            grid-column: 2 / 3;
            background-color: var(--lcars-black) !important;
            padding: 40px !important;
            border-left: 25px solid var(--lcars-gold) !important;
            border-top: 25px solid var(--lcars-orange) !important;
            border-radius: 0 0 0 60px !important;
            margin: 0 !important;
        }

        /* LCARS-STYLE CARDS - Modular data panels */
        body.lcars-theme .hpe-card {
            background: #080808 !important;
            border: 3px solid var(--lcars-gold) !important;
            border-radius: 50px 0 50px 0 !important;
            padding: 25px !important;
            position: relative;
            box-shadow: inset 0 0 20px rgba(255,204,0,0.1) !important;
        }

        body.lcars-theme .hpe-card::before {
            content: "DATA_SEC_01";
            position: absolute;
            top: -12px;
            left: 30px;
            background: var(--lcars-pink);
            color: white;
            font-size: 9px;
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: bold;
        }

        /* THE BUTTONS - Aggressive override for all button-like elements */
        body.lcars-theme button,
        body.lcars-theme [onclick].bg-\[#01A982\],
        body.lcars-theme [onclick].bg-green-600 {
            background-color: var(--lcars-gold) !important;
            color: var(--lcars-black) !important;
            border-radius: 25px 0 25px 0 !important;
            font-weight: 900 !important;
            text-transform: uppercase !important;
            border: none !important;
            padding: 12px 30px !important;
            transition: all 0.2s ease;
            box-shadow: 6px 6px 0 var(--lcars-orange) !important;
            cursor: pointer;
        }

        body.lcars-theme button:hover,
        body.lcars-theme [onclick].bg-\[#01A982\]:hover,
        body.lcars-theme [onclick].bg-green-600:hover {
            background-color: var(--lcars-orange) !important;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0 var(--lcars-gold) !important;
        }

        /* INPUTS as recessed terminals */
        body.lcars-theme input,
        body.lcars-theme select {
            background-color: #000 !important;
            border: 3px solid var(--lcars-blue) !important;
            color: var(--lcars-blue) !important;
            border-radius: 0 !important;
            font-family: 'Courier New', monospace !important;
            padding-left: 15px !important;
            text-transform: uppercase !important;
        }

        body.lcars-theme .sub-nav-item {
            background: var(--lcars-orange) !important;
            color: var(--lcars-black) !important;
            border-radius: 20px !important;
            font-weight: bold !important;
            padding: 6px 18px !important;
            margin: 0 6px !important;
        }

        body.lcars-theme .sub-nav-item.active {
            background: var(--lcars-blue) !important;
            color: white !important;
        }

        body.lcars-theme .text-slate-500,
        body.lcars-theme .text-slate-400,
        body.lcars-theme .text-slate-600 {
            color: var(--lcars-orange) !important;
        }

        body.lcars-theme .text-blue-600 {
            color: var(--lcars-blue) !important;
        }

        body.lcars-theme .bg-slate-50,
        body.lcars-theme .bg-slate-100 {
            background-color: #050505 !important;
            border: 3px solid var(--lcars-gold) !important;
            border-radius: 20px 0 20px 0 !important;
        }
 la-manager secret $\rightarrow$ lab-manager-secret.

        /* Star Wars Imperial Theme Overrides */
        body.sw-theme {
            --hpe-bg-light: #0a0a0a;
            --hpe-white: #111;
            --hpe-text-main: #e2e2e2;
            --hpe-text-muted: #888;
            --hpe-border: #333;
            --hpe-green: #ff0000;
            --hpe-navy: #000;
            background-color: #0a0a0a !important;
            color: #e2e2e2 !important;
        }

        body.sw-theme .hpe-sidebar {
            background-color: #000 !important;
            border-right: 1px solid #ff0000 !important;
        }

        body.sw-theme .hpe-topbar {
            background-color: #000 !important;
            border-bottom: 2px solid #ff0000 !important;
        }

        body.sw-theme .hpe-card {
            background: #111 !important;
            border: 1px solid #333 !important;
            border-left: 4px solid #ff0000 !important;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.1) !important;
        }

        body.sw-theme .nav-item {
            color: #888 !important;
        }

        body.sw-theme .nav-item:hover,
        body.sw-theme .nav-item.active {
            background: rgba(255, 0, 0, 0.1) !important;
            color: #fff !important;
            border-left: 4px solid #ff0000 !important;
        }

        body.sw-theme .sub-nav-item {
            color: #666 !important;
        }

        body.sw-theme .sub-nav-item.active {
            color: #ff0000 !important;
            font-weight: bold !important;
        }

        body.sw-theme #viewport {
            background-color: #0a0a0a !important;
        }

        body.sw-theme input,
        body.sw-theme select {
            background-color: #000 !important;
            border-color: #444 !important;
            color: #fff !important;
        }

        body.sw-theme button {
            background-color: #ff0000 !important;
            color: #fff !important;
            text-transform: uppercase !important;
            letter-spacing: 1px !important;
        }

        body.sw-theme .text-slate-500,
        body.sw-theme .text-slate-400,
        body.sw-theme .text-slate-600 {
            color: #666 !important;
        }

        body.sw-theme .bg-slate-50,
        body.sw-theme .bg-slate-100 {
            background-color: #0f0f0f !important;
            border-color: #222 !important;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--hpe-bg-light);
            color: var(--hpe-text-main);
            margin: 0;
            overflow: hidden;
        }
        .hpe-sidebar {
            background-color: var(--hpe-white);
            border-right: 1px solid var(--hpe-border);
        }
        .hpe-topbar {
            background-color: var(--hpe-navy);
            border-bottom: 3px solid var(--hpe-green);
        }
        .hpe-card {
            background: var(--hpe-white);
            border: 1px solid var(--hpe-border);
            border-radius: 6px;
        }
        .nav-item {
            transition: all 0.2s ease;
            cursor: pointer;
            color: var(--hpe-text-main);
        }
        .nav-item:hover {
            background: rgba(1, 169, 130, 0.1);
            color: var(--hpe-green);
        }
        .nav-item.active {
            background: rgba(1, 169, 130, 0.15);
            color: var(--hpe-green);
            font-weight: 600;
            border-left: 4px solid var(--hpe-green);
        }
        .sub-nav-item {
            transition: all 0.2s ease;
            cursor: pointer;
            color: #cbd5e1;
        }
        .sub-nav-item:hover { color: #fff; }
        .sub-nav-item.active { color: #fff; font-weight: 600; }
        .status-pulse { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden">

    <!-- LEFT MAIN MENU -->
    <aside class="h-full w-64 hpe-sidebar flex flex-col">
        <div class="p-6 mb-4">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold tracking-tight text-[#263040]">Lab Manager</h1>
            </div>
            <div id="connection-status" class="mt-4 flex items-center gap-2 px-2 py-1 rounded-full bg-slate-100 text-[10px] font-medium w-fit border border-slate-200">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-400 status-pulse"></div>
                <span class="text-slate-500">Connecting...</span>
            </div>
        </div>

        <nav id="main-nav" class="flex-1 px-3 space-y-1">
            <div onclick="setView('dashboard')" id="nav-dashboard" class="nav-item active p-3 rounded-r-lg flex items-center gap-3 text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a8 8 0 018 8 8 8 0 018-8m-12 8a8 8 0 01-8-8 8 8 0 018-8m0 16v2m0-6V4m-2 8h4m-2 4h4m-4-8a4 4 0 01-4-4V4a4 4 0 014 0v4a4 4 0 014 0v4a4 4 0 01-4 0z"></path></svg>
                Dashboard
            </div>
            <!-- Dynamic Module Navs Injected Here -->
            <div class="pt-4 mt-4 border-t border-slate-200"></div>
            <div onclick="setView('setup')" id="nav-setup" class="nav-item p-3 rounded-r-lg flex items-center gap-3 text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110-4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m-2 8h4m-2 4h4m-4-8a4 4 0 01-4-4V4a4 4 0 014 0v4a4 4 0 014 0v4a4 4 0 01-4 0z"></path></svg>
                Setup
            </div>
            <div onclick="setView('settings')" id="nav-settings" class="nav-item p-3 rounded-r-lg flex items-center gap-3 text-sm font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-1.59 4.04-1.59 5.583 0a1.724 1.724 0 001.28 2.915c-1.344 1.35-3.77 1.35-5.114 0a1.724 1.724 0 00-1.28-2.915zM12 18a6 6 0 100-12 6 6 0 000 12z"></path></svg>
                System
            </div>
        </nav>

        <div class="p-4 border-t border-slate-200 text-[10px] text-slate-400 text-center uppercase tracking-widest font-bold">
            v<span id="footer-version">0.07</span>
        </div>
    </aside>

    <!-- MAIN AREA -->
    <main class="flex-1 flex flex-col min-w-0">

        <!-- TOP HEADER / SUB-MENU -->
        <header class="h-16 hpe-topbar flex items-center px-6 justify-between border-b border-slate-800">
            <div id="top-nav" class="flex items-center gap-6 text-sm font-medium text-slate-300">
                <!-- Dynamically injected sub-menu items -->
            </div>

            <div class="flex items-center gap-4">
                <!-- GLOBAL SEARCH -->
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                        <svg class="w-4 h-4 text-slate-400 group-focus-within:text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input id="global-search" type="text"
                           placeholder="Search spokes, VMs..."
                           class="bg-slate-800 border border-slate-700 rounded-full pl-10 pr-4 py-1.5 text-xs focus:ring-2 focus:ring-green-500 outline-none transition-all w-64 text-white placeholder-slate-400"
                           oninput="handleSearch(this.value)">

                    <!-- Search Results Dropdown -->
                    <div id="search-results" class="hidden absolute top-full mt-2 w-full max-h-60 overflow-y-auto bg-white border border-slate-300 rounded-xl shadow-2xl z-50 p-2 space-y-1">
                        <!-- Results injected here -->
                    </div>
                </div>
                <div class="text-xs text-slate-300 font-mono hidden md:block" id="hub-ip">172.16.0.116:8000</div>
            </div>
        </header>

        <!-- CONTENT VIEWPORT -->
        <div id="viewport" class="flex-1 p-8 overflow-y-auto bg-[#F5F5F5]">
            <!-- VIEWS INJECTED HERE -->
        </div>
    </main>

    <script src="main.js"></script>
    <script src="update_handler.js"></script>
</body>
</html>
